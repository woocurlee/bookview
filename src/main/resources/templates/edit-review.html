<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('리뷰 수정 - BookView')}"></head>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    #editor-container {
        height: 280px;
        margin-bottom: 10px;
    }

    .ql-toolbar.ql-snow {
        border: 2px solid #e5e7eb;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        background: #f9fafb;
        padding: 12px;
    }

    .ql-container.ql-snow {
        border: 2px solid #e5e7eb;
        border-radius: 0 0 8px 8px;
        font-size: 16px;
        background: white;
    }

    .ql-editor {
        min-height: 220px;
        padding: 20px;
    }

    .ql-editor.ql-blank::before {
        color: #9ca3af;
        font-style: normal;
    }

    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 15px;
    }

    .ql-snow .ql-stroke {
        stroke: #6b7280;
    }

    .ql-snow .ql-fill {
        fill: #6b7280;
    }

    .ql-snow .ql-picker-label {
        color: #6b7280;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow button:focus,
    .ql-toolbar.ql-snow button.ql-active {
        color: #10b981;
    }

    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow button:focus .ql-stroke,
    .ql-toolbar.ql-snow button.ql-active .ql-stroke {
        stroke: #10b981;
    }

    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow button:focus .ql-fill,
    .ql-toolbar.ql-snow button.ql-active .ql-fill {
        fill: #10b981;
    }
</style>
<body class="bg-gradient-to-br from-emerald-500 to-green-600 min-h-screen">
    <header th:replace="~{layout :: header}"></header>

    <div class="max-w-4xl mx-auto px-5 py-5">
        <div class="bg-white rounded-2xl p-6 md:p-10 shadow-lg">
            <!-- 상단 헤더 -->
            <div class="flex items-center gap-4 mb-8">
                <button onclick="history.back()" class="text-gray-600 hover:text-emerald-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">리뷰 수정</h1>
            </div>

            <form id="editReviewForm">
                <!-- 책 정보 (읽기 전용) -->
                <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                    <div class="flex gap-4">
                        <img th:src="${review.bookThumbnail}"
                             alt="책 표지"
                             th:if="${review.bookThumbnail != null && !review.bookThumbnail.isEmpty()}"
                             class="w-20 h-28 object-cover rounded shadow">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800" th:text="${review.bookTitle}">책 제목</h3>
                            <p class="text-gray-600" th:text="${review.bookAuthor}">저자</p>
                        </div>
                    </div>
                </div>

                <!-- 리뷰 제목 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-gray-700">리뷰 제목 *</label>
                    <input type="text"
                           id="title"
                           th:value="${review.title}"
                           class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500"
                           placeholder="리뷰 제목을 입력하세요"
                           required>
                </div>

                <!-- 별점 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-gray-700">별점 *</label>
                    <div class="flex gap-2">
                        <button type="button" th:each="i : ${#numbers.sequence(1, 5)}"
                                th:data-rating="${i}"
                                class="star-btn text-4xl text-gray-300 hover:text-yellow-400 transition-colors"
                                onclick="setRating(this)">
                            ★
                        </button>
                    </div>
                    <input type="hidden" id="rating" th:value="${review.rating}">
                </div>

                <!-- 명언 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-gray-700">인상 깊은 문장 *</label>
                    <textarea id="quote"
                              th:text="${review.quote}"
                              class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500"
                              rows="3"
                              placeholder="책에서 인상 깊었던 문장을 적어주세요 (5~100자)"
                              minlength="5"
                              maxlength="100"
                              required></textarea>
                    <div class="text-xs text-gray-500 mt-1">
                        <span id="quoteCount">0</span>/100
                    </div>
                </div>

                <!-- 리뷰 내용 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-gray-700">리뷰 내용 *</label>
                    <div id="editor-container">
                        <div id="editor"></div>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="flex gap-3 md:mt-16 mt-24">
                    <button type="button"
                            onclick="history.back()"
                            class="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-semibold">
                        취소
                    </button>
                    <button type="submit"
                            class="flex-1 py-3 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors font-semibold">
                        수정 완료
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script th:inline="javascript">
        const reviewId = /*[[${review.id}]]*/ '';
        const reviewNo = /*[[${review.reviewNo}]]*/ 0;
        const initialRating = /*[[${review.rating}]]*/ 0;
        const initialContent = /*[[${review.content}]]*/ '';

        // Quill 에디터 초기화
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: '책을 읽고 느낀 점을 자유롭게 작성해주세요',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['blockquote', 'code-block'],
                    ['clean']
                ]
            }
        });

        // 초기 컨텐츠 설정 (HTML로 설정)
        if (initialContent) {
            quill.root.innerHTML = initialContent;
        }

        // 별점 초기화
        document.addEventListener('DOMContentLoaded', function() {
            updateStarDisplay(initialRating);

            // 명언 글자수 카운터
            const quoteTextarea = document.getElementById('quote');
            const quoteCount = document.getElementById('quoteCount');

            function updateQuoteCount() {
                quoteCount.textContent = quoteTextarea.value.length;
            }

            updateQuoteCount();
            quoteTextarea.addEventListener('input', updateQuoteCount);
        });

        function setRating(button) {
            const rating = parseInt(button.dataset.rating);
            document.getElementById('rating').value = rating;
            updateStarDisplay(rating);
        }

        function updateStarDisplay(rating) {
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.remove('text-gray-300');
                    star.classList.add('text-yellow-400');
                } else {
                    star.classList.remove('text-yellow-400');
                    star.classList.add('text-gray-300');
                }
            });
        }

        document.getElementById('editReviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const rating = parseInt(document.getElementById('rating').value);
            const quote = document.getElementById('quote').value.trim();
            const content = quill.root.innerHTML.trim();

            // 유효성 검사
            if (!title || !quote) {
                alert('모든 필수 항목을 입력해주세요.');
                return;
            }

            if (!content || content === '<p><br></p>') {
                alert('리뷰 내용을 입력해주세요.');
                return;
            }

            if (!rating || rating < 1 || rating > 5) {
                alert('별점을 선택해주세요.');
                return;
            }

            if (quote.length < 5 || quote.length > 100) {
                alert('인상 깊은 문장은 5~100자 사이로 입력해주세요.');
                return;
            }

            try {
                const response = await fetch(`/api/reviews/${reviewId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title,
                        rating,
                        quote,
                        content
                    })
                });

                if (response.ok) {
                    alert('리뷰가 수정되었습니다!');
                    window.location.href = `/r/${reviewNo}`;
                } else {
                    alert('리뷰 수정에 실패했습니다.');
                }
            } catch (error) {
                console.error('수정 오류:', error);
                alert('리뷰 수정에 실패했습니다.');
            }
        });
    </script>
</body>
</html>

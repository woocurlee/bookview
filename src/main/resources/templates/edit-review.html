<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('리뷰 수정 - BookView')}"></head>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    #editor-container {
        height: 280px;
        margin-bottom: 10px;
    }

    .ql-toolbar.ql-snow {
        border: 2px solid #e5e7eb;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        background: #f9fafb;
        padding: 12px;
    }

    .ql-container.ql-snow {
        border: 2px solid #e5e7eb;
        border-radius: 0 0 8px 8px;
        font-size: 16px;
        background: white;
    }

    .ql-editor {
        min-height: 220px;
        padding: 20px;
    }

    .ql-editor.ql-blank::before {
        color: #9ca3af;
        font-style: normal;
        left: 20px;
        right: 20px;
    }

    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 15px;
    }

    .ql-snow .ql-stroke {
        stroke: #6b7280;
    }

    .ql-snow .ql-fill {
        fill: #6b7280;
    }

    .ql-snow .ql-picker-label {
        color: #6b7280;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow button:focus,
    .ql-toolbar.ql-snow button.ql-active {
        color: #f59e0b;
    }

    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow button:focus .ql-stroke,
    .ql-toolbar.ql-snow button.ql-active .ql-stroke {
        stroke: #f59e0b;
    }

    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow button:focus .ql-fill,
    .ql-toolbar.ql-snow button.ql-active .ql-fill {
        fill: #f59e0b;
    }
</style>
<body class="bg-gradient-to-br from-stone-100 to-stone-50 min-h-screen">
    <header th:replace="~{layout :: header}"></header>

    <div class="max-w-4xl mx-auto px-5 py-5">
        <div class="bg-white rounded-xl p-6 md:p-8 shadow-md">
            <!-- 상단 헤더 -->
            <div class="flex items-center gap-4 mb-8">
                <button onclick="history.back()" class="text-stone-600 hover:text-amber-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <h1 class="text-2xl md:text-3xl font-bold text-stone-800">리뷰 수정</h1>
            </div>

            <form id="editReviewForm">
                <!-- 책 정보 (읽기 전용) -->
                <div class="mb-6 p-4 bg-stone-50 rounded-lg">
                    <div class="flex gap-4">
                        <img th:src="${review.bookThumbnail}"
                             th:alt="${review.bookTitle + ' 표지'}"
                             th:if="${review.bookThumbnail != null && !review.bookThumbnail.isEmpty()}"
                             class="w-20 h-28 object-cover rounded shadow">
                        <div>
                            <h3 class="font-bold text-lg text-stone-800" th:text="${review.bookTitle}">책 제목</h3>
                            <p class="text-stone-600" th:text="${review.bookAuthor}">저자</p>
                        </div>
                    </div>
                </div>

                <!-- 리뷰 제목 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-stone-700">리뷰 제목 *</label>
                    <input type="text"
                           id="title"
                           th:value="${review.title}"
                           class="w-full p-3 border-2 border-stone-300 rounded-lg text-stone-900 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 placeholder:text-stone-400"
                           placeholder="리뷰 제목을 입력하세요"
                           required>
                </div>

                <!-- 별점 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-stone-700">별점 *</label>
                    <div class="flex gap-2">
                        <button type="button" th:each="i : ${#numbers.sequence(1, 5)}"
                                th:data-rating="${i}"
                                th:attr="aria-label='별 ' + ${i} + '개'"
                                class="star-btn text-2xl text-stone-300 hover:text-yellow-400 transition-colors"
                                onclick="setRating(this)">
                            ★
                        </button>
                    </div>
                    <input type="hidden" id="rating" th:value="${review.rating}">
                </div>

                <!-- 명언 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-stone-700">인상 깊은 문장 *</label>
                    <textarea id="quote"
                              th:text="${review.quote}"
                              class="w-full p-3 border-2 border-stone-300 rounded-lg text-stone-900 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 placeholder:text-stone-400"
                              rows="3"
                              placeholder="책에서 인상 깊었던 문장을 적어주세요 (5~100자)"
                              minlength="5"
                              maxlength="100"
                              required></textarea>
                    <div class="text-xs text-stone-500 mt-1">
                        <span id="quoteCount">0</span>/100
                    </div>
                </div>

                <!-- 리뷰 내용 -->
                <div class="mb-6">
                    <label class="block mb-2 font-semibold text-stone-700">리뷰 내용 *</label>
                    <div id="editor-container">
                        <div id="editor"></div>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="flex gap-3 md:mt-16 mt-24">
                    <button type="button"
                            onclick="history.back()"
                            class="flex-1 py-2.5 bg-stone-200 text-stone-800 rounded-lg hover:bg-stone-300 transition-colors font-semibold">
                        취소
                    </button>
                    <button type="submit"
                            class="flex-1 py-2.5 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors font-semibold shadow-sm hover:shadow-md">
                        수정 완료
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{layout :: footer}"></footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/edit-review.js"></script>
    <script th:inline="javascript">
        const reviewId = /*[[${review.id}]]*/ '';
        const reviewNo = /*[[${review.reviewNo}]]*/ 0;
        const initialRating = /*[[${review.rating}]]*/ 0;
        const initialContent = /*[[${review.content}]]*/ '';

        document.addEventListener('DOMContentLoaded', function() {
            initEditReviewPage(reviewId, reviewNo, initialRating, initialContent);
        });
    </script>
    <script th:replace="~{layout :: mobileMenuScript}"></script>
</body>
</html>

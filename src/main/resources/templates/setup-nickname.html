<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('닉네임 설정 - BookView')}"></head>
<body class="bg-gradient-to-br from-emerald-500 to-green-600 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl p-8 md:p-12 shadow-2xl max-w-md w-full mx-5">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-600 mb-2">📚 BookView</h1>
            <p class="text-gray-600">닉네임을 설정해주세요</p>
        </div>

        <form id="nicknameForm" class="space-y-6">
            <div>
                <label for="nickname" class="block text-sm font-semibold text-gray-700 mb-2">
                    닉네임
                </label>
                <input
                    type="text"
                    id="nickname"
                    name="nickname"
                    required
                    minlength="1"
                    maxlength="30"
                    placeholder="영어 소문자, 숫자, _, . 사용 가능 (1~30자)"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    autocomplete="false"
                />
                <p class="text-xs text-gray-500 mt-1">영어 소문자, 숫자, 밑줄(_), 마침표(.) 사용 가능</p>
            </div>

            <button
                type="submit"
                class="w-full py-3 bg-gradient-to-r from-emerald-500 to-green-500 text-white font-semibold rounded-lg hover:from-emerald-600 hover:to-green-600 transition-all shadow-md hover:shadow-lg"
            >
                시작하기
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('nicknameForm');
        const nicknameInput = document.getElementById('nickname');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nickname = nicknameInput.value.trim();

            // 길이 검증
            if (nickname.length < 1 || nickname.length > 30) {
                alert('닉네임은 1~30자 사이로 입력해주세요.');
                return;
            }

            // 영어 소문자, 숫자, 밑줄, 마침표만 허용
            if (!/^[a-z0-9_.]+$/.test(nickname)) {
                alert('닉네임은 영어 소문자, 숫자, 밑줄(_), 마침표(.)만 사용할 수 있습니다.');
                return;
            }

            // 마침표로 시작하거나 끝나는지 검증
            if (nickname.startsWith('.') || nickname.endsWith('.')) {
                alert('닉네임은 마침표(.)로 시작하거나 끝날 수 없습니다.');
                return;
            }

            // 연속된 마침표 검증
            if (nickname.includes('..')) {
                alert('마침표(..)를 연속으로 사용할 수 없습니다.');
                return;
            }

            try {
                const response = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ nickname }),
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    alert(error.message || '닉네임 설정에 실패했습니다. 다시 시도해주세요.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('오류가 발생했습니다. 다시 시도해주세요.');
            }
        });
    </script>
</body>
</html>

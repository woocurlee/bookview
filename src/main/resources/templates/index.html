<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('BookView - 책 리뷰 플랫폼')}"></head>
<body class="bg-gradient-to-br from-stone-100 to-stone-50 min-h-screen mb-10">
<header th:replace="~{layout :: header}"></header>

<div class="max-w-7xl mx-auto px-5">
    <!-- 리뷰 작성 유도 박스 -->
    <div th:if="${user != null}"
         onclick="goToWriteReview()"
         class="bg-white rounded-xl p-5 mb-8 shadow-md flex gap-4 items-center cursor-pointer transition-all hover:-translate-y-1 hover:shadow-lg">
        <img src="/images/default-avatar.svg" alt="프로필" class="w-12 h-12 rounded-full object-cover">
        <div class="flex-1 py-3 px-5 bg-stone-100 rounded-full text-stone-400 text-base">오늘 읽은 책에 대한 생각을 공유해보세요...</div>
    </div>

    <!-- 최근 리뷰 섹션 -->
    <section th:if="${reviews != null && !reviews.isEmpty()}">
        <div id="reviewsContainer" th:each="review : ${reviews}">
            <a th:href="@{/r/{reviewNo}(reviewNo=${review.reviewNo})}" class="block no-underline">
                <div class="bg-white rounded-xl p-5 mb-5 shadow-sm transition-all hover:-translate-y-1 hover:shadow-md duration-200 flex gap-5 cursor-pointer">
                <img th:src="${review.bookThumbnail}"
                     th:alt="${review.bookTitle + ' 표지'}"
                     th:if="${review.bookThumbnail != null && !review.bookThumbnail.isEmpty()}"
                     class="h-48 object-cover rounded-lg flex-shrink-0">
                <div class="flex-1">
                    <div class="text-xl font-bold mb-2 text-stone-800" th:text="${review.title}">리뷰 제목</div>
                    <div class="text-sm text-stone-600 mb-2.5">
                        <span th:text="${review.bookTitle}">책 제목</span> -
                        <span th:text="${review.bookAuthor}">저자</span>
                    </div>
                    <div class="text-yellow-400 text-2xl mb-2">
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span><span th:if="${review.rating < 5}" th:each="i : ${#numbers.sequence(review.rating + 1, 5)}">☆</span>
                    </div>
                    <div th:if="${review.quote != null && !review.quote.isEmpty()}"
                         class="relative mb-4 pl-5 py-3 border-l-4 border-amber-400 bg-amber-50 rounded-r-lg">
                        <p class="text-stone-700 italic text-base" th:text="${review.quote}"></p>
                    </div>
                    <div class="text-stone-700 leading-relaxed mb-2.5 overflow-hidden line-clamp-3"
                         th:utext="${review.content}">리뷰 내용...
                    </div>
                    <div class="flex items-center gap-4 text-xs text-stone-400">
                        <span th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-12-24 10:00</span>
                        <span th:if="${review.likeCount > 0}" class="flex items-center gap-1 text-red-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 fill-current" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                            <span th:text="${review.likeCount}">0</span>
                        </span>
                    </div>
                </div>
            </div>
        </a>
        </div>
        <div id="loading" class="text-center p-5 hidden">
            <p>로딩 중...</p>
        </div>
        <div id="endMessage" class="text-center p-5 hidden">
            <p>모든 리뷰를 불러왔습니다. 🎉</p>
        </div>
    </section>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="/js/common.js"></script>
<script>
    // hasMore 초기값 설정
    hasMore = /*[[${hasMoreReviews}]]*/ true;
</script>
<script src="/js/index.js"></script>
<script th:replace="~{layout :: mobileMenuScript}"></script>
</body>
</html>

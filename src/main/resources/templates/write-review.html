<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('리뷰 작성 - BookView')}"></head>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    /* Quill 에디터 커스텀 스타일 */
    #editor-container {
        height: 280px;
        margin-bottom: 10px;
    }

    .ql-toolbar.ql-snow {
        border: 2px solid #e5e7eb;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        background: #f9fafb;
        padding: 12px;
    }

    .ql-container.ql-snow {
        border: 2px solid #e5e7eb;
        border-radius: 0 0 8px 8px;
        font-size: 16px;
        background: white;
    }

    .ql-editor {
        min-height: 220px;
        padding: 20px;
    }

    .ql-editor.ql-blank::before {
        color: #9ca3af;
        font-style: normal;
        left: 20px;
        right: 20px;
    }

    /* 툴바 버튼 스타일 */
    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 15px;
    }

    .ql-snow .ql-stroke {
        stroke: #6b7280;
    }

    .ql-snow .ql-fill {
        fill: #6b7280;
    }

    .ql-snow .ql-picker-label {
        color: #6b7280;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow button:focus,
    .ql-toolbar.ql-snow button.ql-active {
        color: #10b981;
    }

    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow button:focus .ql-stroke,
    .ql-toolbar.ql-snow button.ql-active .ql-stroke {
        stroke: #10b981;
    }

    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow button:focus .ql-fill,
    .ql-toolbar.ql-snow button.ql-active .ql-fill {
        fill: #10b981;
    }

    .star.active {
        color: #ffd700;
    }
</style>
<body class="bg-gradient-to-br from-emerald-500 to-green-600 min-h-screen">
    <header th:replace="~{layout :: header}"></header>

    <div class="max-w-4xl mx-auto px-5 py-5">
        <div class="bg-white rounded-2xl p-10 shadow-lg">
            <h1 class="text-gray-800 mb-8 text-3xl font-bold">📝 리뷰 작성</h1>

            <div class="mb-6">
                <label class="block mb-2 font-semibold text-gray-800">리뷰 제목 <span class="text-red-500">*</span></label>
                <input type="text" id="reviewTitle" placeholder="리뷰 제목을 입력하세요" autocomplete="off"
                       class="w-full p-3 border-2 border-gray-200 rounded-lg text-base focus:outline-none focus:border-emerald-500">
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-semibold text-gray-800">책 선택 <span class="text-red-500">*</span></label>
                <button onclick="openBookModal()" class="w-full p-3 bg-emerald-500 text-white rounded-lg text-base cursor-pointer transition-colors hover:bg-emerald-600">
                    책 검색하기
                </button>
                <div id="selectedBook" class="hidden mt-4 p-4 bg-gray-50 rounded-lg">
                    <div class="flex gap-4">
                        <img id="selectedBookThumbnail" src="" alt="책 표지" class="w-20 h-28 object-cover rounded">
                        <div class="flex-1">
                            <div id="selectedBookTitle" class="font-semibold mb-1"></div>
                            <div id="selectedBookAuthor" class="text-gray-600 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-semibold text-gray-800">별점 <span class="text-red-500">*</span></label>
                <div id="rating" class="flex gap-2 text-4xl">
                    <span class="star cursor-pointer text-gray-300 transition-colors" data-rating="1" onclick="setRating(1)" onmouseenter="hoverRating(1)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-gray-300 transition-colors" data-rating="2" onclick="setRating(2)" onmouseenter="hoverRating(2)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-gray-300 transition-colors" data-rating="3" onclick="setRating(3)" onmouseenter="hoverRating(3)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-gray-300 transition-colors" data-rating="4" onclick="setRating(4)" onmouseenter="hoverRating(4)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-gray-300 transition-colors" data-rating="5" onclick="setRating(5)" onmouseenter="hoverRating(5)" onmouseleave="resetHover()">★</span>
                </div>
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-semibold text-gray-800">명언 <span class="text-red-500">*</span> (5~100자)</label>
                <input type="text" id="quote" placeholder="책에서 인상 깊었던 명언을 입력하세요" maxlength="100" autocomplete="off"
                       class="w-full p-3 border-2 border-gray-200 rounded-lg text-base focus:outline-none focus:border-emerald-500">
                <div class="text-xs text-gray-400 mt-1">
                    <span id="quoteLength">0</span>/100자
                </div>
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-semibold text-gray-800">리뷰 내용 <span class="text-red-500">*</span></label>
                <div id="editor-container">
                    <div id="editor"></div>
                </div>
            </div>

            <button onclick="submitReview()" class="w-full p-4 bg-green-500 text-white rounded-lg text-lg font-semibold cursor-pointer transition-colors hover:bg-green-600 md:mt-16 mt-24">
                리뷰 등록
            </button>
        </div>
    </div>

    <!-- 책 검색 모달 -->
    <div id="bookModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 z-50 flex justify-center items-center" onclick="handleModalClick(event)">
        <div class="bg-white rounded-2xl p-8 w-11/12 max-w-2xl max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-gray-800 text-2xl font-bold">책 검색</h2>
                <span onclick="closeBookModal()" class="text-4xl cursor-pointer text-gray-400 hover:text-gray-600">&times;</span>
            </div>
            <div class="flex gap-2 mb-5">
                <input type="text" id="bookSearch" placeholder="책 제목이나 저자를 입력하세요" autocomplete="off"
                       class="flex-1 p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-green-500">
                <button onclick="searchBooks()" class="px-3 md:px-5 py-3 bg-green-500 text-white rounded-lg cursor-pointer hover:bg-green-600 whitespace-nowrap">검색</button>
            </div>
            <!-- 로딩바 -->
            <div id="bookLoading" class="hidden text-center py-8">
                <div class="inline-block w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-gray-600">검색 중...</p>
            </div>
            <div id="bookList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <footer th:replace="~{layout :: footer}"></footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/write-review.js"></script>
    <script th:replace="~{layout :: mobileMenuScript}"></script>
</body>
</html>

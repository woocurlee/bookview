<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${review != null ? '리뷰 수정 - BookView' : '리뷰 작성 - BookView'})}"></head>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    /* Quill 에디터 커스텀 스타일 */
    #editor-container {
        height: 280px;
        margin-bottom: 10px;
    }

    .ql-toolbar.ql-snow {
        border: 2px solid #e5e7eb;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        background: #f9fafb;
        padding: 12px;
    }

    .ql-container.ql-snow {
        border: 2px solid #e5e7eb;
        border-radius: 0 0 8px 8px;
        font-size: 16px;
        background: white;
    }

    .ql-editor {
        min-height: 220px;
        padding: 20px;
    }

    .ql-editor.ql-blank::before {
        color: #9ca3af;
        font-style: normal;
        left: 20px;
        right: 20px;
    }

    /* 툴바 버튼 스타일 */
    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 15px;
    }

    .ql-snow .ql-stroke {
        stroke: #6b7280;
    }

    .ql-snow .ql-fill {
        fill: #6b7280;
    }

    .ql-snow .ql-picker-label {
        color: #6b7280;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow button:focus,
    .ql-toolbar.ql-snow button.ql-active {
        color: #f59e0b;
    }

    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow button:focus .ql-stroke,
    .ql-toolbar.ql-snow button.ql-active .ql-stroke {
        stroke: #f59e0b;
    }

    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow button:focus .ql-fill,
    .ql-toolbar.ql-snow button.ql-active .ql-fill {
        fill: #f59e0b;
    }

    .star.active {
        color: #ffd700;
    }
</style>
<body class="bg-gradient-to-br from-stone-100 to-stone-50 min-h-screen">
    <header th:replace="~{layout :: header}"></header>

    <div class="max-w-4xl mx-auto px-5 py-5">
        <div class="bg-white rounded-xl p-6 md:p-8 shadow-md">
            <!-- 헤더 (편집 모드일 때만 뒤로가기 버튼 표시) -->
            <div th:if="${review != null}" class="flex items-center gap-4 mb-8">
                <button onclick="history.back()" class="text-stone-600 hover:text-amber-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <h1 class="text-2xl md:text-3xl font-bold text-stone-800">리뷰 수정</h1>
            </div>
            <h1 th:if="${review == null}" class="text-stone-800 mb-8 text-3xl font-bold">📝 리뷰 작성</h1>

            <!-- 리뷰 제목 -->
            <div class="mb-6">
                <label class="block mb-2 font-semibold text-stone-800">리뷰 제목 <span class="text-red-500">*</span></label>
                <input type="text" id="reviewTitle" placeholder="리뷰 제목을 입력하세요" autocomplete="off"
                       th:value="${review != null ? review.title : ''}"
                       class="w-full p-3 border-2 border-stone-300 rounded-lg text-base text-stone-900 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 placeholder:text-stone-400">
            </div>

            <!-- 책 선택 (작성 모드) -->
            <div th:if="${review == null}" class="mb-6">
                <label class="block mb-2 font-semibold text-stone-800">책 선택 <span class="text-red-500">*</span></label>
                <button onclick="openBookModal()" class="w-full p-3 bg-amber-500 text-white rounded-lg text-base cursor-pointer transition-colors hover:bg-amber-600 shadow-sm hover:shadow-md">
                    책 검색하기
                </button>
                <div id="selectedBook" class="hidden mt-4 p-4 bg-stone-50 rounded-lg">
                    <div class="flex gap-4">
                        <img id="selectedBookThumbnail" src="" alt="책 표지" class="w-20 h-28 object-cover rounded">
                        <div class="flex-1">
                            <div id="selectedBookTitle" class="font-semibold mb-1"></div>
                            <div id="selectedBookAuthor" class="text-gray-600 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 책 정보 (편집 모드, 읽기 전용) -->
            <div th:if="${review != null}" class="mb-6 p-4 bg-stone-50 rounded-lg">
                <div class="flex gap-4">
                    <img th:src="${review.bookThumbnail}"
                         alt="책 표지"
                         th:if="${review.bookThumbnail != null && !review.bookThumbnail.isEmpty()}"
                         class="w-20 h-28 object-cover rounded shadow">
                    <div>
                        <h3 class="font-bold text-lg text-stone-800" th:text="${review.bookTitle}">책 제목</h3>
                        <p class="text-stone-600" th:text="${review.bookAuthor}">저자</p>
                    </div>
                </div>
            </div>

            <!-- 별점 -->
            <div class="mb-6">
                <label class="block mb-2 font-semibold text-stone-800">별점 <span class="text-red-500">*</span></label>
                <div id="rating" class="flex gap-2 text-2xl">
                    <span class="star cursor-pointer text-stone-300 transition-colors" aria-label="별 1개" data-rating="1" onclick="setRating(1)" onmouseenter="hoverRating(1)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-stone-300 transition-colors" aria-label="별 2개" data-rating="2" onclick="setRating(2)" onmouseenter="hoverRating(2)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-stone-300 transition-colors" aria-label="별 3개" data-rating="3" onclick="setRating(3)" onmouseenter="hoverRating(3)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-stone-300 transition-colors" aria-label="별 4개" data-rating="4" onclick="setRating(4)" onmouseenter="hoverRating(4)" onmouseleave="resetHover()">★</span>
                    <span class="star cursor-pointer text-stone-300 transition-colors" aria-label="별 5개" data-rating="5" onclick="setRating(5)" onmouseenter="hoverRating(5)" onmouseleave="resetHover()">★</span>
                </div>
            </div>

            <!-- 인상 깊은 문장 -->
            <div class="mb-6">
                <label class="block mb-2 font-semibold text-stone-800">인상 깊은 문장 <span class="text-red-500">*</span> (5~100자)</label>
                <textarea id="quote" placeholder="책에서 인상 깊었던 문장을 적어주세요" maxlength="100" autocomplete="off" rows="3"
                          th:text="${review != null ? review.quote : ''}"
                          class="w-full p-3 border-2 border-stone-300 rounded-lg text-base text-stone-900 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 placeholder:text-stone-400"></textarea>
                <div class="text-xs text-stone-400 mt-1">
                    <span id="quoteLength">0</span>/100자
                </div>
            </div>

            <!-- 리뷰 내용 -->
            <div class="mb-6">
                <label class="block mb-2 font-semibold text-stone-800">리뷰 내용 <span class="text-red-500">*</span></label>
                <div id="editor-container">
                    <div id="editor"></div>
                </div>
            </div>

            <!-- 버튼 -->
            <div th:if="${review != null}" class="flex gap-3 md:mt-16 mt-24">
                <button type="button" onclick="history.back()"
                        class="flex-1 p-4 bg-stone-200 text-stone-800 rounded-lg text-lg font-semibold cursor-pointer transition-colors hover:bg-stone-300">
                    취소
                </button>
                <button onclick="submitReview()"
                        class="flex-1 p-4 bg-amber-500 text-white rounded-lg text-lg font-semibold cursor-pointer transition-colors hover:bg-amber-600">
                    수정 완료
                </button>
            </div>
            <button th:if="${review == null}" onclick="submitReview()"
                    class="w-full py-2.5 bg-amber-500 text-white rounded-lg text-base font-semibold cursor-pointer transition-all hover:bg-amber-600 shadow-sm hover:shadow-md md:mt-16 mt-24">
                리뷰 등록
            </button>
        </div>
    </div>

    <!-- 책 검색 모달 (작성 모드만) -->
    <div th:if="${review == null}" id="bookModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 z-50 flex justify-center items-center" onclick="handleModalClick(event)">
        <div class="bg-white rounded-2xl p-8 w-11/12 max-w-2xl max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-stone-800 text-2xl font-bold">책 검색</h2>
                <span onclick="closeBookModal()" class="text-4xl cursor-pointer text-stone-400 hover:text-stone-600">&times;</span>
            </div>
            <div class="flex gap-2 mb-5">
                <input type="text" id="bookSearch" placeholder="책 제목이나 저자를 입력하세요" autocomplete="off"
                       class="flex-1 p-3 border-2 border-stone-300 rounded-lg text-stone-900 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 placeholder:text-stone-400">
                <button onclick="searchBooks()" class="px-3 md:px-5 py-3 bg-amber-500 text-white rounded-lg cursor-pointer hover:bg-amber-600 whitespace-nowrap">검색</button>
            </div>
            <!-- 로딩바 -->
            <div id="bookLoading" class="hidden text-center py-8">
                <div class="inline-block w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-stone-600">검색 중...</p>
            </div>
            <div id="bookList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <footer th:replace="~{layout :: footer}"></footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/write-review.js"></script>
    <script th:inline="javascript">
        // 편집 모드 데이터
        const isEditMode = /*[[${review != null}]]*/ false;
        const reviewId = /*[[${review != null ? review.id : ''}]]*/ '';
        const reviewNo = /*[[${review != null ? review.reviewNo : 0}]]*/ 0;
        const initialRating = /*[[${review != null ? review.rating : 0}]]*/ 0;
        const initialContent = /*[[${review != null ? review.content : ''}]]*/ '';
    </script>
    <script th:replace="~{layout :: mobileMenuScript}"></script>
</body>
</html>

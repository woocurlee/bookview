<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('리뷰 상세 - BookView')}"></head>
<style>
    .review-quote {
        background: #f0f0f0;
        border-left: 4px solid #10b981;
        padding: 12px 16px;
        margin-bottom: 10px;
        font-style: italic;
        color: #555;
        border-radius: 4px;
    }
</style>
<body class="bg-gradient-to-br from-emerald-500 to-green-600 min-h-screen">
    <header th:replace="~{layout :: header}"></header>

    <div class="max-w-4xl mx-auto px-5 py-5">
        <div class="bg-white rounded-2xl p-6 md:p-10 shadow-lg">
            <!-- 상단 헤더 -->
            <div class="flex justify-between items-center mb-6">
                <button onclick="history.back()" class="text-gray-600 hover:text-emerald-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>

                <!-- 더보기 버튼 (본인만) -->
                <div th:if="${user != null && user.googleId == review.userId}" class="relative">
                    <button onclick="toggleMenu()" class="text-gray-600 hover:text-gray-800 text-2xl px-2">
                        ⋯
                    </button>
                    <!-- 드롭다운 메뉴 -->
                    <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-32 bg-white rounded-lg shadow-lg border border-gray-200 z-10">
                        <a th:href="@{/r/{reviewNo}/edit(reviewNo=${review.reviewNo})}"
                           class="block px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-t-lg transition-colors">
                            수정하기
                        </a>
                        <button onclick="deleteReview()"
                                th:attr="data-review-id=${review.id}"
                                class="w-full text-left px-4 py-3 text-red-600 hover:bg-gray-100 hover:text-red-700 rounded-lg transition-colors">
                            삭제하기
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-6 mb-4 lg:mb-8">
                <!-- 책 표지 -->
                <img th:src="${review.bookThumbnail}"
                     alt="책 표지"
                     th:if="${review.bookThumbnail != null && !review.bookThumbnail.isEmpty()}"
                     class="w-48 h-64 object-cover rounded-lg shadow-md mx-auto md:mx-0 flex-shrink-0">

                <div class="flex-1">
                    <!-- 리뷰 제목 -->
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4" th:text="${review.title}">리뷰 제목</h1>

                    <!-- 책 정보 -->
                    <div class="text-gray-600 mb-4 flex items-center lg:gap-2 gap-1">
                        <span class="text-lg font-semibold" th:text="${review.bookTitle}">책 제목</span>
                        <span>-</span>
                        <span th:text="${review.bookAuthor}">저자</span>
                    </div>

                    <!-- 별점 -->
                    <div class="text-yellow-400 text-2xl mb-4">
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span><span th:if="${review.rating < 5}" th:each="i : ${#numbers.sequence(review.rating + 1, 5)}">☆</span>
                    </div>

                    <!-- 작성자 및 날짜 -->
                    <div class="flex items-center gap-3 mb-4 pb-4 border-b border-gray-200">
                        <img src="/images/default-avatar.svg" alt="프로필" class="w-10 h-10 rounded-full">
                        <div>
                            <a th:href="@{/u/{nickname}(nickname=${author?.nickname})}" class="font-semibold text-gray-800 hover:text-emerald-600 transition-colors" th:text="${author?.nickname}">작성자</a>
                            <div class="text-xs text-gray-400" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-12-24 10:00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 명언 -->
            <div class="review-quote mb-6" th:if="${review.quote != null && !review.quote.isEmpty()}">
                "<span th:text="${review.quote}"></span>"
            </div>

            <!-- 리뷰 내용 -->
            <div class="prose max-w-none">
                <div class="text-gray-700 leading-relaxed text-base md:text-lg" th:utext="${review.content}">
                    리뷰 내용...
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout :: footer}"></footer>

    <script src="/js/common.js"></script>
    <script src="/js/review-detail.js"></script>
    <script th:inline="javascript">
        const reviewId = /*[[${review.id}]]*/ '';

        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('hidden');
        }

        // 메뉴 외부 클릭시 닫기
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('dropdownMenu');
            const button = event.target.closest('button');

            if (menu && !menu.contains(event.target) && (!button || button.onclick?.toString().indexOf('toggleMenu') === -1)) {
                menu.classList.add('hidden');
            }
        });
    </script>
    <script th:replace="~{layout :: mobileMenuScript}"></script>
</body>
</html>

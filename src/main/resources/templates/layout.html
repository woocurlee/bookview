<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
    <title th:text="${title}">BookView</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<header th:fragment="header" class="bg-white shadow-md mb-8 relative z-30">
    <div class="max-w-7xl mx-auto px-5 py-5">
        <div class="flex justify-between items-center">
            <button onclick="toggleMobileMenu()" class="lg:hidden text-3xl text-emerald-600 focus:outline-none z-50 relative">
                ☰
            </button>
            <a href="/" class="text-3xl font-bold text-emerald-600 no-underline lg:block absolute left-1/2 transform -translate-x-1/2 lg:static lg:transform-none">📚 BookView</a>
            <div class="hidden lg:flex items-center gap-4">
                <div th:if="${user != null}">
                    <div class="flex items-center gap-4">
                        <a href="/write-review" class="px-6 py-2.5 bg-gradient-to-r from-emerald-500 to-green-500 text-white rounded-lg hover:from-emerald-600 hover:to-green-600 transition-all shadow-md hover:shadow-lg font-semibold">
                            ✏️ 리뷰 작성
                        </a>
                        <a href="/my-page" class="flex items-center gap-3 px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors cursor-pointer">
                            <img src="/images/default-avatar.svg" alt="프로필" class="w-9 h-9 rounded-full ring-2 ring-emerald-200">
                            <span th:text="${user.nickname}" class="font-semibold text-gray-700">사용자</span>
                        </a>
                        <button onclick="openLogoutModal()" class="px-5 py-2.5 text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all font-semibold">
                            로그아웃
                        </button>
                    </div>
                </div>
                <div th:if="${user == null}">
                    <a href="/oauth2/authorization/google" class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-green-500 text-white rounded-lg hover:from-emerald-600 hover:to-green-600 transition-all shadow-md hover:shadow-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        구글 로그인
                    </a>
                </div>
            </div>
            <div class="w-8 lg:hidden"></div>
        </div>
    </div>
    <div id="mobileMenuOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" onclick="toggleMobileMenu()"></div>
    <div id="mobileMenu" class="fixed top-0 left-0 h-full w-80 bg-white shadow-xl transform -translate-x-full transition-transform duration-300 z-50 lg:hidden flex flex-col">
        <div class="p-6 flex flex-col gap-4 flex-1">
            <button onclick="toggleMobileMenu()" class="self-end text-3xl text-gray-500 hover:text-gray-700">×</button>
            <div th:if="${user != null}">
                <div class="flex items-center gap-3 pb-4 border-b border-gray-200">
                    <img src="/images/default-avatar.svg" alt="프로필" class="w-12 h-12 rounded-full">
                    <span th:text="${user.nickname}" class="font-semibold text-lg">사용자</span>
                </div>
                <a href="/my-page" class="block py-4 px-4 text-gray-700 hover:bg-emerald-50 rounded-md mt-2">👤 마이페이지</a>
                <a href="/write-review" class="block py-4 px-4 text-gray-700 hover:bg-emerald-50 rounded-md">✏️ 글쓰기</a>
            </div>
            <div th:if="${user == null}">
                <a href="/oauth2/authorization/google" class="block py-4 px-4 bg-emerald-500 text-white text-center rounded-md hover:bg-emerald-600">구글 로그인</a>
            </div>
        </div>
        <!-- 로그아웃 버튼 (하단 고정) -->
        <div th:if="${user != null}" class="p-6 border-t border-gray-200">
            <button onclick="openLogoutModal()" class="w-full block py-4 px-4 text-center text-red-600 hover:bg-red-50 rounded-md font-semibold">🚪 로그아웃</button>
        </div>
    </div>

    <!-- 로그아웃 확인 모달 -->
    <div id="logoutModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 z-[60] flex justify-center items-center">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-11/12 shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">로그아웃</h2>
            <p class="text-gray-600 mb-6">정말 로그아웃 하시겠습니까?</p>
            <div class="flex gap-3">
                <button onclick="closeLogoutModal()" class="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-semibold">
                    취소
                </button>
                <a href="/logout" class="flex-1 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-semibold text-center">
                    로그아웃
                </a>
            </div>
        </div>
    </div>
</header>

<!-- 별점 표시 컴포넌트 -->
<div th:fragment="starRating(rating)" class="text-yellow-400 mb-2.5">
    <span th:each="i : ${#numbers.sequence(1, rating)}">★</span><span th:if="${rating < 5}" th:each="i : ${#numbers.sequence(rating + 1, 5)}">☆</span>
</div>

<!-- 리뷰 인용구 컴포넌트 -->
<div th:fragment="reviewQuote(quote)" class="review-quote" th:if="${quote != null && !quote.isEmpty()}">
    "<span th:text="${quote}"></span>"
</div>

<!-- Footer -->
<footer th:fragment="footer" class="bg-white border-t border-gray-200 mt-16 py-8">
    <div class="max-w-7xl mx-auto px-5">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <div class="text-2xl font-bold text-emerald-600 mb-2">📚 BookView</div>
                <p class="text-gray-600 text-sm">책 리뷰를 공유하는 플랫폼</p>
            </div>

            <div class="text-center md:text-right">
                <p class="text-gray-600 text-sm mb-2">에러 제보 및 문의</p>
                <a href="mailto:your-email@example.com"
                   class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center justify-center md:justify-end gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                    </svg>
                    woocurlee@gmail.com
                </a>
            </div>
        </div>

        <div class="border-t border-gray-200 mt-6 pt-6">
            <div class="flex justify-center gap-6 mb-4">
                <a href="/terms-of-service.html" class="text-gray-600 hover:text-emerald-600 text-sm transition-colors">
                    서비스 이용약관
                </a>
                <span class="text-gray-300">|</span>
                <a href="/privacy-policy.html" class="text-gray-600 hover:text-emerald-600 text-sm transition-colors">
                    개인정보처리방침
                </a>
            </div>
            <p class="text-gray-500 text-sm text-center">© 2026 BookView. All rights reserved.</p>
        </div>
    </div>
</footer>

<script th:fragment="mobileMenuScript" src="/js/mobile-menu.js"></script>
</html>
